<template>
    <lightning-card
            title="Item Purchase Tool"
            icon-name="standard:product">

        <template if:true={account}>
            <div class="slds-p-around_medium">
                <p>
                    <b>Account Name:</b>
                    {account.Name}
                </p>
                <p>
                    <b>Account Number:</b>
                    {account.AccountNumber}
                </p>
                <p>
                    <b>Industry:</b>
                    {account.Industry}
                </p>
            </div>
        </template>

        <template if:true={error}>
            <p class="slds-text-color_error">
                Error loading account
            </p>
        </template>

    </lightning-card>
</template>
